name: CI / CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancelar runs anteriores del mismo branch para ahorrar minutos
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint + Test ─────────────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test
        env:
          # Tests usan mocks — no necesitan credenciales reales
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-key-for-tests

  # ── 2. Build de producción ─────────────────────────────────
  build:
    name: Production Build
    runs-on: ubuntu-latest
    needs: test
    # Solo buildear en push a main/develop, no en PRs
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build production
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_APP_VERSION: ${{ github.sha }}
          VITE_APP_ENV: production
          VITE_ANALYTICS_ENABLED: 'true'

      - name: Verify build output
        run: |
          test -f dist/index.html || (echo "ERROR: dist/index.html no existe" && exit 1)
          echo "Build size:"
          du -sh dist/

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.sha }}
          path: dist/
          retention-days: 14

  # ── 3. Security audit ──────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: npm audit (high severity only)
        run: npm audit --audit-level=high

      - name: Check for .env files accidentally committed
        run: |
          if git ls-files | grep -E '\.env$|\.env\.local$|\.env\.production$'; then
            echo "ERROR: Archivo .env sensible encontrado en el repositorio"
            exit 1
          fi
          echo "✓ No se encontraron archivos .env sensibles"
